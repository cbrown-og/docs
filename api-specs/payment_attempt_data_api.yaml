{"openapi":"3.0.0","info":{"title":"Placement Responses API","version":"2.3.0"},"servers":[{"url":"https://restapi.ordergroove.com","description":"Production server"},{"url":"https://staging.restapi.ordergroove.com","description":"Staging server"}],"paths":{"/placement_logs/responses/":{"get":{"summary":"Retrieve placement responses with cursor-based pagination","description":"Returns a paginated list of placement responses sorted with the oldest entries on top.","tags":["Placement responses"],"parameters":[{"name":"start_date","in":"query","schema":{"type":"string","format":"date-time"},"description":"Filter by entries created on or after a specific date/time. Expected format is `YYYY-MM-DD HH:mm:ss`\n"},{"name":"end_date","in":"query","schema":{"type":"string","format":"date-time"},"description":"Filter by entries created before (non-inclusive) a specific date/time. Expected format is `YYYY-MM-DD HH:mm:ss`\n"},{"name":"page_size","in":"query","schema":{"type":"number"},"description":"Number of results to be retrieved in each page. Default value is 10. Maximum allowed is 1000.\n"}],"responses":{"200":{"description":"Successful retrieval of placement responses","content":{"application/json":{"schema":{"type":"object","properties":{"next":{"type":"string","nullable":true,"description":"URL for the next page of results, or null if at the last page","example":"https://restapi.ordergroove.com/placement_logs/responses/?cursor=cD0yMDI0LTA4LTA0KzE2JTNBNTglM0ExMi4yNDUwMDA%3D"},"previous":{"type":"string","nullable":true,"description":"URL for the previous page of results, or null if at the first page","example":"https://restapi.ordergroove.com/placement_logs/responses/?cursor=cD0yMDI0LTA4LTA0KzE2JTNBNTglM0ExMi4yNDUwMDA%3D"},"results":{"type":"array","items":{"type":"object","properties":{"merchant":{"type":"string","description":"The public ID of the merchant","example":"asdf123"},"order":{"type":"string","description":"The original public ID for the order","example":"6fda37265d2811ef92240241a91b1780"},"customer":{"type":"string","description":"The ID of the merchant user","example":"12345"},"response_code":{"type":"string","description":"The original system response code.\n- `000`: Success\n- `140`: Payment declined\n","example":"140"},"response_message":{"type":"string","description":"Description of the response or error","example":"Selected Credit Card was declined. Please enter new Credit Card and try again."},"response_order_id":{"type":"string","nullable":true,"description":"Order identifier in merchant's system, if applicable","example":null},"created":{"type":"string","format":"date-time","description":"Timestamp when the response was created","example":"2024-11-24 08:59:15"}}}}}}}}},"400":{"description":"Invalid request","content":{"application/json":{"schema":{"type":"object","properties":{"response_message":{"type":"string","example":"Invalid input: order missing."}}}}}},"401":{"description":"Unauthorized request","content":{"application/json":{"schema":{"type":"object","properties":{"response_message":{"type":"string","example":"Unauthorized access. Please provide valid credentials."}}}}}},"403":{"description":"Forbidden request","content":{"application/json":{"schema":{"type":"object","properties":{"response_message":{"type":"string","example":"Access denied. You do not have permission to access this resource."}}}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"type":"object","properties":{"response_message":{"type":"string","example":"Processing error occurred."}}}}}}}}}}}